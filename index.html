<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDCyclAr</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f9fafb; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-in { animation-duration: 0.2s; animation-fill-mode: forwards; }
        .fade-in { animation-name: fadeIn; }
        .slide-in-bottom { animation-name: slideInBottom; }
        .zoom-in { animation-name: zoomIn; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInBottom { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Logo = ({ size = 24, color = "currentColor", className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 100 100" style={{ color }} className={className} xmlns="http://www.w3.org/2000/svg">
                <g>
                    <path d="M 83.053 62.58 A 35 35 0 0 1 50 85 M 50 85 L 50 85 L 52.544 94.619" fill="none" stroke="currentColor" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
                    <path d="M 16.946 37.41 A 35 35 0 0 1 50 15 M 50 15 L 50 15 L 47.455 5.38" fill="none" stroke="currentColor" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
                    <path d="M 62.58 16.94 A 35 35 0 0 1 85 50 M 85 50 L 85 50 L 94.619 47.45" fill="none" stroke="currentColor" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
                    <path d="M 37.41 83.05 A 35 35 0 0 1 15 50 M 15 50 L 15 50 L 5.38 52.54" fill="none" stroke="currentColor" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
                    <path d="M 50,37 L 61.258,43.5 L 61.258,56.5 L 50,63 L 38.741,56.5 L 38.741,43.5 Z M 50,50 L 50,63 M 50,50 L 38.741,43.5 M 50,50 L 61.258,43.5" fill="none" stroke="currentColor" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" />
                </g>
            </svg>
        );

        const initialFolders = [{ id: 'f1', name: '💻 プロジェクト', parentId: null }, { id: 'f2', name: '🌱 自己研鑽', parentId: null }];
        const initialSystems = [
            { id: 's1', folderId: 'f1', title: 'PDCyclAr ツール開発' },
            { id: 's3', folderId: 'f2', title: '英語学習（TOEIC）' }
        ];
        const initialCycles = [{
            id: 'c1', systemId: 's1', date: new Date().toISOString(),
            plan: '要件定義とUI作成', do: '単一HTMLで動くように実装した。',
            check: '機能は十分だが、追加や編集がしにくい部分があった。', action: '3点ボタンと専用モーダルを追加して操作性を上げる。'
        }];

        const STORAGE_KEY = 'pdcyclar_data_v3';
        const loadData = () => {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) return JSON.parse(data);
            } catch (e) { console.error(e); }
            return { folders: initialFolders, systems: initialSystems, cycles: initialCycles };
        };
        const saveData = (folders, systems, cycles) => {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ folders, systems, cycles })); } catch (e) { console.error(e); }
        };

        const App = () => {
            const [data, setData] = useState(loadData);
            const { folders, systems, cycles } = data;

            useEffect(() => { saveData(folders, systems, cycles); }, [folders, systems, cycles]);

            const [activeSystemId, setActiveSystemId] = useState(systems.length > 0 ? systems[0].id : null);
            const [editingCycleId, setEditingCycleId] = useState(null);
            
            const [expandedFolders, setExpandedFolders] = useState(() => {
                const initialExp = {};
                folders.forEach(f => initialExp[f.id] = true);
                return initialExp;
            });

            const [formData, setFormData] = useState({ plan: '', do: '', check: '', action: '', date: '' });

            // UIステート
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [mobileView, setMobileView] = useState('sidebar'); 
            const [sidebarWidth, setSidebarWidth] = useState(300);
            const [isDragging, setIsDragging] = useState(false);
            
            // 3点メニュー（ドロップダウン）の管理
            const [activeDropdown, setActiveDropdown] = useState(null);

            // モーダル管理
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', isDanger: true, onConfirm: null });
            const [inputModal, setInputModal] = useState({ isOpen: false, title: '', placeholder: '', value: '', onConfirm: null });
            const [alertModal, setAlertModal] = useState({ isOpen: false, title: '', message: '', isSuccess: false });

            // ファイル入力の参照
            const fileInputRef = useRef(null);

            // リサイズ・クリック外イベント
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const handleClickOutside = () => setActiveDropdown(null);
                document.addEventListener('click', handleClickOutside);
                return () => document.removeEventListener('click', handleClickOutside);
            }, []);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!isDragging) return;
                    setSidebarWidth(Math.max(200, Math.min(e.clientX, 600)));
                };
                const handleMouseUp = () => setIsDragging(false);
                if (isDragging) {
                    document.addEventListener('mousemove', handleMouseMove);
                    document.addEventListener('mouseup', handleMouseUp);
                }
                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isDragging]);

            const activeSystem = useMemo(() => systems.find(s => s.id === activeSystemId), [systems, activeSystemId]);
            const activeCycles = useMemo(() => {
                return cycles.filter(c => c.systemId === activeSystemId).sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [cycles, activeSystemId]);

            const updateState = (newFolders, newSystems, newCycles) => {
                setData({ folders: newFolders, systems: newSystems, cycles: newCycles });
            };

            const toggleFolder = (folderId) => {
                setExpandedFolders(prev => ({ ...prev, [folderId]: !prev[folderId] }));
            };

            const handleSelectSystem = (systemId) => {
                setActiveSystemId(systemId);
                setEditingCycleId(null);
                if (isMobile) setMobileView('main');
            };

            // --- 入力・作成処理 (Input Modal利用) ---
            const openCreateFolder = (parentId = null) => {
                setInputModal({
                    isOpen: true, title: parentId ? 'サブフォルダを作成' : '新しいフォルダを作成', placeholder: 'フォルダ名', value: '',
                    onConfirm: (name) => {
                        const newFolder = { id: `f${Date.now()}`, name, parentId };
                        updateState([...folders, newFolder], systems, cycles);
                        setExpandedFolders(prev => ({ ...prev, [newFolder.id]: true }));
                        if (parentId) {
                            setExpandedFolders(prev => ({ ...prev, [parentId]: true }));
                        }
                    }
                });
            };

            const openRenameFolder = (folder) => {
                setInputModal({
                    isOpen: true, title: 'フォルダ名を変更', placeholder: 'フォルダ名', value: folder.name,
                    onConfirm: (name) => {
                        updateState(folders.map(f => f.id === folder.id ? { ...f, name } : f), systems, cycles);
                    }
                });
            };

            const openCreateSystem = (folderId) => {
                setInputModal({
                    isOpen: true, title: '新しいサイクル系統を作成', placeholder: 'テーマやタイトル', value: '',
                    onConfirm: (title) => {
                        const newSystem = { id: `s${Date.now()}`, folderId, title };
                        updateState(folders, [...systems, newSystem], cycles);
                        handleSelectSystem(newSystem.id);
                        if (!expandedFolders[folderId]) toggleFolder(folderId);
                    }
                });
            };

            const openRenameSystem = (system) => {
                setInputModal({
                    isOpen: true, title: 'サイクル系統の名前を変更', placeholder: 'テーマやタイトル', value: system.title,
                    onConfirm: (title) => {
                        updateState(folders, systems.map(s => s.id === system.id ? { ...s, title } : s), cycles);
                    }
                });
            };

            // --- 削除処理 (Confirm Modal利用) ---
            const requestDeleteFolder = (folder) => {
                setConfirmModal({
                    isOpen: true, title: 'フォルダの削除', isDanger: true,
                    message: `「${folder.name}」と、中に含まれるすべてのサブフォルダ・サイクル系統・サイクルを削除しますか？`,
                    onConfirm: () => {
                        const getFolderIdsToRemove = (fid) => {
                            let ids = [fid];
                            const children = folders.filter(f => f.parentId === fid);
                            children.forEach(child => { ids = [...ids, ...getFolderIdsToRemove(child.id)]; });
                            return ids;
                        };

                        const folderIdsToRemove = getFolderIdsToRemove(folder.id);
                        const targetSystemIds = systems.filter(s => folderIdsToRemove.includes(s.folderId)).map(s => s.id);
                        
                        updateState(
                            folders.filter(f => !folderIdsToRemove.includes(f.id)),
                            systems.filter(s => !targetSystemIds.includes(s.id)),
                            cycles.filter(c => !targetSystemIds.includes(c.systemId))
                        );
                        if (targetSystemIds.includes(activeSystemId)) setActiveSystemId(null);
                        setConfirmModal({ isOpen: false });
                    }
                });
            };

            const requestDeleteSystem = (system) => {
                setConfirmModal({
                    isOpen: true, title: 'サイクル系統の削除', isDanger: true,
                    message: `「${system.title}」と、中に含まれるすべてのサイクルを削除しますか？`,
                    onConfirm: () => {
                        updateState(folders, systems.filter(s => s.id !== system.id), cycles.filter(c => c.systemId !== system.id));
                        if (activeSystemId === system.id) setActiveSystemId(null);
                        setConfirmModal({ isOpen: false });
                    }
                });
            };

            const requestDeleteCycle = (cycleId) => {
                setConfirmModal({
                    isOpen: true, title: 'サイクルの削除', isDanger: true,
                    message: 'このサイクルを削除してもよろしいですか？',
                    onConfirm: () => {
                        updateState(folders, systems, cycles.filter(c => c.id !== cycleId));
                        setConfirmModal({ isOpen: false });
                    }
                });
            };

            // --- ファイルによる保存（エクスポート）と読込（インポート） ---
            const handleExportData = () => {
                const dataToExport = { folders, systems, cycles };
                const dataStr = JSON.stringify(dataToExport, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `pdcyclar_data_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const handleImportClick = () => {
                if (fileInputRef.current) fileInputRef.current.click();
            };

            const handleImportFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.folders && importedData.systems && importedData.cycles) {
                            setConfirmModal({
                                isOpen: true,
                                title: 'データの復元 (インポート)',
                                isDanger: true,
                                message: '現在のすべてのデータは消去され、ファイルの内容で上書きされます。本当によろしいですか？',
                                onConfirm: () => {
                                    updateState(importedData.folders, importedData.systems, importedData.cycles);
                                    setConfirmModal({ isOpen: false });
                                    setAlertModal({ isOpen: true, title: '復元完了', message: 'データを正常に読み込みました。', isSuccess: true });
                                }
                            });
                        } else {
                            setAlertModal({ isOpen: true, title: 'エラー', message: 'ファイル形式が正しくありません。PDCyclArのデータファイルを選択してください。', isSuccess: false });
                        }
                    } catch (err) {
                        setAlertModal({ isOpen: true, title: 'エラー', message: 'ファイルの解析に失敗しました。', isSuccess: false });
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // Reset
            };

            // --- サイクル操作 ---
            const getPreviousAction = () => {
                const sortedCycles = cycles.filter(c => c.systemId === activeSystemId).sort((a, b) => new Date(a.date) - new Date(b.date)); 
                if (sortedCycles.length === 0) return null;
                if (editingCycleId === 'new') return sortedCycles[sortedCycles.length - 1].action;
                const currentIndex = sortedCycles.findIndex(c => c.id === editingCycleId);
                if (currentIndex > 0) return sortedCycles[currentIndex - 1].action;
                return null;
            };

            const openEditor = (cycleId = 'new') => {
                if (cycleId === 'new') {
                    const now = new Date();
                    const tzOffset = now.getTimezoneOffset() * 60000;
                    const localISOTime = (new Date(now.getTime() - tzOffset)).toISOString().slice(0, 16);
                    setFormData({ plan: '', do: '', check: '', action: '', date: localISOTime });
                } else {
                    const target = cycles.find(c => c.id === cycleId);
                    if (target) {
                        const dt = new Date(target.date);
                        const tzOffset = dt.getTimezoneOffset() * 60000;
                        const localISOTime = (new Date(dt.getTime() - tzOffset)).toISOString().slice(0, 16);
                        setFormData({
                            plan: target.plan || '', do: target.do || '', check: target.check || '', action: target.action || '',
                            date: localISOTime
                        });
                    }
                }
                setEditingCycleId(cycleId);
            };

            const handleSaveCycle = () => {
                const isoDate = new Date(formData.date).toISOString();
                if (editingCycleId === 'new') {
                    const newCycle = { id: `c${Date.now()}`, systemId: activeSystemId, ...formData, date: isoDate };
                    updateState(folders, systems, [...cycles, newCycle]);
                } else {
                    const newCycles = cycles.map(c => c.id === editingCycleId ? { ...c, ...formData, date: isoDate } : c);
                    updateState(folders, systems, newCycles);
                }
                setEditingCycleId(null);
            };

            const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const previousAction = getPreviousAction();

            // ドロップダウンのトグル
            const toggleDropdown = (e, id) => {
                e.stopPropagation();
                setActiveDropdown(activeDropdown === id ? null : id);
            };

            // --- 再帰的なフォルダツリーのレンダリング ---
            const renderFolderTree = (parentId = null) => {
                const targetFolders = folders.filter(f => (f.parentId || null) === parentId);
                
                return targetFolders.map(folder => {
                    const folderSystems = systems.filter(s => s.folderId === folder.id);
                    const childFolders = folders.filter(f => f.parentId === folder.id);
                    const hasChildren = childFolders.length > 0 || folderSystems.length > 0;
                    
                    return (
                        <div key={folder.id} className="mb-2">
                            <div 
                                className="flex items-center justify-between px-2 py-2 rounded-xl hover:bg-gray-100 cursor-pointer text-sm font-bold text-gray-700 transition-colors group/folder relative"
                                onClick={() => toggleFolder(folder.id)}
                            >
                                <div className="flex items-center gap-2 overflow-hidden flex-1">
                                    <i className={`ph ${expandedFolders[folder.id] ? "ph-caret-down" : "ph-caret-right"} text-gray-400 ${hasChildren ? '' : 'opacity-0'}`}></i>
                                    <i className="ph ph-folder text-indigo-400 text-lg"></i>
                                    <span className="truncate">{folder.name}</span>
                                </div>
                                
                                <div className="flex items-center gap-1 opacity-100 md:opacity-0 md:group-hover/folder:opacity-100 transition-opacity">
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); openCreateSystem(folder.id); }}
                                        className="p-1.5 text-gray-400 hover:text-indigo-600 hover:bg-white rounded-lg transition-colors shadow-sm border border-transparent hover:border-gray-200"
                                        title="新規サイクル系統"
                                    >
                                        <i className="ph ph-plus text-sm"></i>
                                    </button>
                                    <button 
                                        onClick={(e) => toggleDropdown(e, `folder-${folder.id}`)}
                                        className={`p-1.5 rounded-lg transition-colors shadow-sm border ${activeDropdown === `folder-${folder.id}` ? 'bg-white text-indigo-600 border-gray-200' : 'text-gray-400 hover:text-gray-700 hover:bg-white border-transparent hover:border-gray-200'}`}
                                    >
                                        <i className="ph ph-dots-three-vertical text-sm font-bold"></i>
                                    </button>
                                </div>

                                {/* フォルダ 3点メニュー */}
                                {activeDropdown === `folder-${folder.id}` && (
                                    <div className="absolute right-0 top-full mt-1 w-48 bg-white border border-gray-100 rounded-xl shadow-lg z-50 py-1.5 animate-in fade-in zoom-in" onClick={e => e.stopPropagation()}>
                                        <button onClick={() => { openCreateFolder(folder.id); setActiveDropdown(null); }} className="w-full flex items-center gap-2 text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 font-medium">
                                            <i className="ph ph-folder-plus"></i> サブフォルダを作成
                                        </button>
                                        <button onClick={() => { openRenameFolder(folder); setActiveDropdown(null); }} className="w-full flex items-center gap-2 text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 font-medium">
                                            <i className="ph ph-pencil-simple"></i> 名前を変更
                                        </button>
                                        <div className="h-px bg-gray-100 my-1"></div>
                                        <button onClick={() => { requestDeleteFolder(folder); setActiveDropdown(null); }} className="w-full flex items-center gap-2 text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-medium">
                                            <i className="ph ph-trash"></i> 削除
                                        </button>
                                    </div>
                                )}
                            </div>

                            {expandedFolders[folder.id] && (
                                <div className="ml-5 mt-1 space-y-1 border-l-2 border-gray-100 pl-2">
                                    {renderFolderTree(folder.id)}
                                    
                                    {folderSystems.map(system => (
                                        <div
                                            key={system.id}
                                            onClick={() => handleSelectSystem(system.id)}
                                            className={`group/sys relative flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer text-sm transition-all
                                                ${activeSystemId === system.id && !isMobile ? 'bg-indigo-50 text-indigo-700 font-bold shadow-sm ring-1 ring-indigo-100' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 font-medium'}
                                            `}
                                        >
                                            <div className="flex items-center gap-2 overflow-hidden">
                                                <i className={`ph ph-file-text text-base shrink-0 ${activeSystemId === system.id && !isMobile ? 'text-indigo-500' : 'text-gray-400'}`}></i>
                                                <span className="truncate">{system.title}</span>
                                            </div>
                                            <button 
                                                onClick={(e) => toggleDropdown(e, `sys-${system.id}`)}
                                                className={`p-1.5 rounded-lg transition-colors opacity-100 md:opacity-0 md:group-hover/sys:opacity-100 ${activeDropdown === `sys-${system.id}` ? 'bg-white text-indigo-600 shadow-sm opacity-100' : 'text-gray-400 hover:text-gray-700 hover:bg-white hover:shadow-sm'}`}
                                            >
                                                <i className="ph ph-dots-three-vertical text-sm font-bold"></i>
                                            </button>

                                            {/* システム 3点メニュー */}
                                            {activeDropdown === `sys-${system.id}` && (
                                                <div className="absolute right-0 top-full mt-1 w-40 bg-white border border-gray-100 rounded-xl shadow-lg z-50 py-1.5 animate-in fade-in zoom-in" onClick={e => e.stopPropagation()}>
                                                    <button onClick={() => { openRenameSystem(system); setActiveDropdown(null); }} className="w-full flex items-center gap-2 text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 font-medium">
                                                        <i className="ph ph-pencil-simple"></i> 名前を変更
                                                    </button>
                                                    <div className="h-px bg-gray-100 my-1"></div>
                                                    <button onClick={() => { requestDeleteSystem(system); setActiveDropdown(null); }} className="w-full flex items-center gap-2 text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-medium">
                                                        <i className="ph ph-trash"></i> 削除
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    );
                });
            };

            return (
                <div className={`flex h-screen bg-gray-50 text-gray-800 font-sans overflow-hidden ${isDragging ? 'select-none cursor-col-resize' : ''}`}>
                    
                    {/* 通知(Alert)モーダル */}
                    {alertModal.isOpen && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full overflow-hidden animate-in zoom-in">
                                <div className="p-5 flex gap-4">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${alertModal.isSuccess ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                        <i className={`ph ${alertModal.isSuccess ? 'ph-check-circle' : 'ph-warning'} text-xl`}></i>
                                    </div>
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-900">{alertModal.title}</h3>
                                        <p className="mt-2 text-sm text-gray-600 leading-relaxed">{alertModal.message}</p>
                                    </div>
                                </div>
                                <div className="px-5 py-4 bg-gray-50 flex justify-end border-t border-gray-100">
                                    <button onClick={() => setAlertModal({ isOpen: false })} className="px-5 py-2 text-sm font-bold text-white bg-gray-800 rounded-xl hover:bg-gray-900 transition-colors shadow-sm">
                                        確認
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 確認モーダル */}
                    {confirmModal.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full overflow-hidden animate-in zoom-in">
                                <div className="p-5 flex gap-4">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${confirmModal.isDanger ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`}>
                                        <i className={`ph ${confirmModal.isDanger ? 'ph-warning' : 'ph-info'} text-xl`}></i>
                                    </div>
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-900">{confirmModal.title}</h3>
                                        <p className="mt-2 text-sm text-gray-600 leading-relaxed">{confirmModal.message}</p>
                                    </div>
                                </div>
                                <div className="px-5 py-4 bg-gray-50 flex justify-end gap-3 border-t border-gray-100">
                                    <button onClick={() => setConfirmModal({ isOpen: false })} className="px-4 py-2 text-sm font-bold text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors">
                                        キャンセル
                                    </button>
                                    <button onClick={confirmModal.onConfirm} className={`px-4 py-2 text-sm font-bold text-white rounded-xl shadow-sm transition-colors ${confirmModal.isDanger ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                        実行する
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 入力モーダル */}
                    {inputModal.isOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full overflow-hidden animate-in zoom-in">
                                <div className="p-6">
                                    <h3 className="text-lg font-bold text-gray-900 mb-4">{inputModal.title}</h3>
                                    <input
                                        type="text"
                                        value={inputModal.value}
                                        onChange={(e) => setInputModal({ ...inputModal, value: e.target.value })}
                                        placeholder={inputModal.placeholder}
                                        className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-transparent outline-none transition-all font-medium"
                                        autoFocus
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && inputModal.value.trim()) {
                                                inputModal.onConfirm(inputModal.value.trim());
                                                setInputModal({ isOpen: false });
                                            }
                                        }}
                                    />
                                </div>
                                <div className="px-6 py-4 bg-gray-50 flex justify-end gap-3 border-t border-gray-100">
                                    <button onClick={() => setInputModal({ isOpen: false })} className="px-4 py-2 text-sm font-bold text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors">
                                        キャンセル
                                    </button>
                                    <button 
                                        disabled={!inputModal.value.trim()}
                                        onClick={() => { inputModal.onConfirm(inputModal.value.trim()); setInputModal({ isOpen: false }); }} 
                                        className="px-5 py-2 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        決定
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- 左ペイン（サイドバー） --- */}
                    <div 
                        className={`
                            ${isMobile && mobileView === 'main' ? 'hidden' : 'flex'} 
                            ${isMobile ? 'w-full' : 'md:flex'} 
                            flex-col h-full bg-white flex-shrink-0 relative z-20 border-r border-gray-200
                        `}
                        style={{ width: isMobile ? '100%' : sidebarWidth }}
                    >
                        <div className="p-4 md:p-5 border-b border-gray-100 flex items-center justify-between shrink-0 bg-white">
                            <div className="flex items-center gap-2 text-indigo-600 font-bold text-xl tracking-tight">
                                <Logo size={28} className="text-indigo-600" />
                                <span>PDCyclAr</span>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-3 md:p-4">
                            <div className="flex items-center justify-between mb-3 group px-2">
                                <span className="text-xs font-bold text-gray-400 tracking-wider uppercase">全てのサイクル</span>
                                <button onClick={() => openCreateFolder(null)} className="text-gray-400 hover:text-indigo-600 transition-colors p-1 bg-gray-50 rounded-md shadow-sm border border-gray-100">
                                    <i className="ph ph-folder-plus text-lg"></i>
                                </button>
                            </div>

                            <div className="space-y-2">
                                {/* ルートレベルのフォルダから再帰的に描画 */}
                                {renderFolderTree(null)}
                                
                                {/* フォルダなしシステム（もしあれば） */}
                                {systems.filter(s => s.folderId === null).length > 0 && (
                                    <div className="mt-4 border-t border-gray-100 pt-3 space-y-1">
                                        {systems.filter(s => s.folderId === null).map(system => (
                                            <div
                                                key={system.id}
                                                onClick={() => handleSelectSystem(system.id)}
                                                className={`group/sys relative flex items-center justify-between px-3 py-2.5 rounded-xl cursor-pointer text-sm transition-all
                                                    ${activeSystemId === system.id && !isMobile ? 'bg-indigo-50 text-indigo-700 font-bold shadow-sm ring-1 ring-indigo-100' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 font-medium'}
                                                `}
                                            >
                                                <div className="flex items-center gap-2 overflow-hidden">
                                                    <i className={`ph ph-file-text text-base shrink-0 ${activeSystemId === system.id && !isMobile ? 'text-indigo-500' : 'text-gray-400'}`}></i>
                                                    <span className="truncate">{system.title}</span>
                                                </div>
                                                <button 
                                                    onClick={(e) => toggleDropdown(e, `sys-${system.id}`)}
                                                    className={`p-1.5 rounded-lg transition-colors opacity-100 md:opacity-0 md:group-hover/sys:opacity-100 ${activeDropdown === `sys-${system.id}` ? 'bg-white text-indigo-600 shadow-sm opacity-100' : 'text-gray-400 hover:text-gray-700 hover:bg-white hover:shadow-sm'}`}
                                                >
                                                    <i className="ph ph-dots-three-vertical text-sm font-bold"></i>
                                                </button>

                                                {activeDropdown === `sys-${system.id}` && (
                                                    <div className="absolute right-0 top-full mt-1 w-40 bg-white border border-gray-100 rounded-xl shadow-lg z-50 py-1.5 animate-in fade-in zoom-in" onClick={e => e.stopPropagation()}>
                                                        <button onClick={() => { openRenameSystem(system); setActiveDropdown(null); }} className="w-full flex items-center gap-2 text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 font-medium">
                                                            <i className="ph ph-pencil-simple"></i> 名前を変更
                                                        </button>
                                                        <div className="h-px bg-gray-100 my-1"></div>
                                                        <button onClick={() => { requestDeleteSystem(system); setActiveDropdown(null); }} className="w-full flex items-center gap-2 text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-medium">
                                                            <i className="ph ph-trash"></i> 削除
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* --- データ管理 セクション --- */}
                        <div className="p-4 border-t border-gray-100 bg-gray-50/50 flex flex-col gap-3 shrink-0">
                            <div className="text-xs font-bold text-gray-400 tracking-wider uppercase">データ管理</div>
                            <div className="flex gap-2">
                                <button onClick={handleExportData} className="flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-50 hover:text-indigo-600 transition-colors shadow-sm">
                                    <i className="ph ph-download-simple text-base"></i> 保存
                                </button>
                                <button onClick={handleImportClick} className="flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-50 hover:text-indigo-600 transition-colors shadow-sm">
                                    <i className="ph ph-upload-simple text-base"></i> 読込
                                </button>
                                <input type="file" accept=".json,.js,.txt" ref={fileInputRef} onChange={handleImportFile} style={{ display: 'none' }} />
                            </div>
                        </div>
                    </div>

                    {/* --- リサイザー (PCのみ) --- */}
                    {!isMobile && (
                        <div
                            className={`w-1 cursor-col-resize hover:bg-indigo-400 z-10 transition-colors ${isDragging ? 'bg-indigo-500' : 'bg-transparent'}`}
                            onMouseDown={() => setIsDragging(true)}
                        />
                    )}

                    {/* --- 右ペイン（メインコンテンツ） --- */}
                    <div 
                        className={`
                            flex-1 flex-col h-full bg-gray-50/50
                            ${isMobile && mobileView === 'sidebar' ? 'hidden' : 'flex'}
                            ${isMobile ? 'w-full' : 'md:flex'}
                        `}
                    >
                        {activeSystem ? (
                            <>
                                {/* ヘッダー */}
                                <div className="bg-white/80 backdrop-blur-md px-4 md:px-8 py-4 md:py-6 border-b border-gray-200 flex flex-col sm:flex-row sm:items-center justify-between shrink-0 gap-4 z-10">
                                    <div className="flex items-center gap-3 overflow-hidden">
                                        {isMobile && (
                                            <button onClick={() => setMobileView('sidebar')} className="p-2 -ml-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors shrink-0">
                                                <i className="ph ph-caret-left text-2xl"></i>
                                            </button>
                                        )}
                                        <div className="overflow-hidden">
                                            <h1 className="text-xl md:text-2xl font-black text-gray-800 truncate tracking-tight">{activeSystem.title}</h1>
                                            <p className="text-xs md:text-sm text-gray-500 mt-0.5 flex items-center gap-1.5">
                                                <i className="ph ph-target text-base"></i> サイクル系統
                                            </p>
                                        </div>
                                    </div>
                                    
                                    {!editingCycleId && (
                                        <button
                                            onClick={() => openEditor('new')}
                                            className="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl shadow-md shadow-indigo-200 transition-all font-bold text-sm w-full sm:w-auto shrink-0 active:scale-95"
                                        >
                                            <i className="ph ph-plus text-base font-bold"></i> 新規サイクル
                                        </button>
                                    )}
                                </div>

                                {/* コンテンツエリア */}
                                <div className="flex-1 overflow-y-auto p-4 md:p-8 relative">
                                    
                                    {editingCycleId ? (
                                        // --- エディタ ---
                                        <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden animate-in slide-in-bottom">
                                            <div className="px-4 md:px-6 py-4 bg-gray-50/80 border-b border-gray-200 flex justify-between items-center">
                                                <h2 className="text-base md:text-lg font-bold text-gray-800 flex items-center gap-2">
                                                    {editingCycleId === 'new' ? <><i className="ph ph-plus-circle text-xl text-indigo-500"></i> 新しいサイクル</> : <><i className="ph ph-pencil-simple text-xl text-indigo-500"></i> サイクルを編集</>}
                                                </h2>
                                                <button onClick={() => setEditingCycleId(null)} className="text-gray-400 hover:text-gray-600 p-1.5 bg-white rounded-full border border-gray-200 shadow-sm transition-colors">
                                                    <i className="ph ph-x text-lg"></i>
                                                </button>
                                            </div>
                                            
                                            <div className="p-4 md:p-6 space-y-6">
                                                <div className="flex items-center gap-3">
                                                    <div className="p-2 bg-gray-100 rounded-lg"><i className="ph ph-calendar text-xl text-gray-500"></i></div>
                                                    <input 
                                                        type="datetime-local" 
                                                        name="date"
                                                        value={formData.date}
                                                        onChange={handleChange}
                                                        className="px-3 py-2 border border-gray-300 rounded-lg text-sm font-medium focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none w-full sm:w-auto bg-gray-50 focus:bg-white transition-colors"
                                                    />
                                                </div>

                                                {previousAction && (
                                                    <div className="bg-green-50 border border-green-100 border-l-4 border-l-green-500 p-4 rounded-r-xl rounded-l-sm flex gap-3 items-start">
                                                        <i className="ph ph-arrow-circle-right text-xl text-green-600 shrink-0 mt-0.5"></i>
                                                        <div>
                                                            <p className="text-xs font-bold text-green-800 uppercase tracking-wider mb-1">前回の改善点 (Action)</p>
                                                            <p className="text-sm text-green-900 leading-relaxed font-medium">{previousAction}</p>
                                                        </div>
                                                    </div>
                                                )}

                                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                                    {[
                                                        { id: 'plan', label: 'Plan (計画)', char: 'P', color: 'blue' },
                                                        { id: 'do', label: 'Do (実行)', char: 'D', color: 'amber' },
                                                        { id: 'check', label: 'Check (評価)', char: 'C', color: 'purple' },
                                                        { id: 'action', label: 'Action (改善)', char: 'A', color: 'emerald' }
                                                    ].map(field => (
                                                        <div key={field.id} className="space-y-2 relative group">
                                                            <label className={`flex items-center gap-2 font-bold text-${field.color}-700`}>
                                                                <span className={`bg-${field.color}-100 text-${field.color}-800 w-7 h-7 rounded-full flex items-center justify-center text-sm shadow-sm`}>{field.char}</span>
                                                                {field.label}
                                                            </label>
                                                            <textarea
                                                                name={field.id} value={formData[field.id]} onChange={handleChange}
                                                                placeholder={`${field.label}を記入...`}
                                                                className={`w-full h-32 md:h-40 p-4 border border-gray-200 rounded-xl bg-${field.color}-50/30 focus:bg-white focus:ring-2 focus:ring-${field.color}-500 outline-none resize-none transition-all text-sm md:text-base leading-relaxed`}
                                                            />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            <div className="px-4 md:px-6 py-4 bg-gray-50/80 border-t border-gray-200 flex flex-col-reverse sm:flex-row justify-end gap-3">
                                                <button onClick={() => setEditingCycleId(null)} className="px-5 py-2.5 text-sm font-bold text-gray-600 bg-white border border-gray-300 hover:bg-gray-50 rounded-xl transition-colors w-full sm:w-auto text-center shadow-sm">
                                                    キャンセル
                                                </button>
                                                <button onClick={handleSaveCycle} className="flex items-center justify-center gap-2 px-8 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-xl shadow-md shadow-indigo-200 transition-all w-full sm:w-auto active:scale-95">
                                                    <i className="ph ph-floppy-disk text-lg"></i> 保存する
                                                </button>
                                            </div>
                                        </div>

                                    ) : (
                                        // --- 一覧 ---
                                        <div className="max-w-4xl mx-auto pb-10">
                                            {activeCycles.length === 0 ? (
                                                <div className="text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300 px-4 shadow-sm">
                                                    <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4">
                                                        <i className="ph ph-activity text-3xl text-gray-400"></i>
                                                    </div>
                                                    <h3 className="text-xl font-bold text-gray-900 mb-2">まだサイクルがありません</h3>
                                                    <p className="text-gray-500 text-sm mb-8 font-medium">最初のPDCAサイクルを回して、改善を始めましょう。</p>
                                                    <button onClick={() => openEditor('new')} className="inline-flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl shadow-md hover:bg-indigo-700 transition-all font-bold active:scale-95">
                                                        <i className="ph ph-plus text-lg"></i> 最初のサイクルを作成
                                                    </button>
                                                </div>
                                            ) : (
                                                <div className="space-y-6 md:space-y-8">
                                                    {activeCycles.map((cycle, index) => (
                                                        <div key={cycle.id} className="relative pl-6 md:pl-10 animate-in fade-in">
                                                            {/* タイムライン */}
                                                            <div className="absolute left-[11px] md:left-[15px] top-8 bottom-[-32px] w-0.5 bg-indigo-100 last:hidden rounded-full"></div>
                                                            <div className="absolute left-0 md:left-1 top-6 w-6 h-6 md:w-8 md:h-8 rounded-full bg-indigo-50 border-[3px] border-white flex items-center justify-center shadow-sm">
                                                                <div className="w-2 h-2 md:w-3 md:h-3 rounded-full bg-indigo-500"></div>
                                                            </div>

                                                            {/* カード */}
                                                            <div className="bg-white border border-gray-100 rounded-2xl md:rounded-3xl p-5 md:p-8 shadow-[0_4px_20px_rgb(0,0,0,0.03)] hover:shadow-[0_4px_25px_rgb(0,0,0,0.06)] transition-all group">
                                                                <div className="flex justify-between items-start mb-6">
                                                                    <div className="flex flex-wrap items-center gap-3">
                                                                        <div className="flex items-center gap-1.5 text-gray-500 text-xs md:text-sm font-medium bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100">
                                                                            <i className="ph ph-calendar text-base"></i>
                                                                            {new Date(cycle.date).toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}
                                                                        </div>
                                                                        {index === 0 && <span className="px-2.5 py-1 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-black tracking-wide">LATEST</span>}
                                                                    </div>
                                                                    <div className="flex items-center gap-2 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                                                                        <button onClick={() => requestDeleteCycle(cycle.id)} className="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-xl transition-colors" title="削除">
                                                                            <i className="ph ph-trash text-lg"></i>
                                                                        </button>
                                                                        <button onClick={() => openEditor(cycle.id)} className="text-white bg-indigo-500 hover:bg-indigo-600 p-2 rounded-xl shadow-sm transition-colors" title="編集">
                                                                            <i className="ph ph-pencil-simple text-lg"></i>
                                                                        </button>
                                                                    </div>
                                                                </div>

                                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                                                    {[
                                                                        { label: 'Plan', char: 'P', color: 'blue', text: cycle.plan },
                                                                        { label: 'Do', char: 'D', color: 'amber', text: cycle.do },
                                                                        { label: 'Check', char: 'C', color: 'purple', text: cycle.check },
                                                                        { label: 'Action', char: 'A', color: 'emerald', text: cycle.action }
                                                                    ].map(item => (
                                                                        <div key={item.label} className="space-y-2">
                                                                            <div className={`text-xs font-bold text-${item.color}-700 flex items-center gap-2`}>
                                                                                <span className={`bg-${item.color}-100 w-6 h-6 rounded-full flex items-center justify-center shadow-sm`}>{item.char}</span>
                                                                                <span className="tracking-wide uppercase">{item.label}</span>
                                                                            </div>
                                                                            <p className="text-gray-700 text-sm whitespace-pre-wrap pl-8 leading-relaxed font-medium">
                                                                                {item.text || <span className="text-gray-400 italic font-normal">未記入</span>}
                                                                            </p>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-gray-400 p-4 text-center">
                                <i className="ph ph-target text-6xl mb-6 opacity-20 text-indigo-900"></i>
                                <p className="text-base md:text-lg font-bold text-gray-500">左のメニューからサイクル系統を選択するか、<br/>新しく作成してください</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
